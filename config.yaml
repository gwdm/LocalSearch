# LocalSearch Configuration

# Directories to scan for files
scan_paths:
  - "D:/"                       # Local files for ingestion
  # - "//blackhole/AI"          # Synology SMB share for vector DB

# File extensions to process (grouped by type)
extensions:
  text: [".txt", ".md", ".csv", ".json", ".xml", ".html", ".log", ".yaml", ".yml", ".ini", ".cfg", ".conf", ".rst", ".tex"]
  pdf: [".pdf"]
  docx: [".docx"]
  audio: [".mp3", ".wav", ".flac", ".m4a", ".ogg", ".wma", ".aac"]
  video: [".mp4", ".avi", ".mkv", ".mov", ".webm", ".wmv", ".flv"]
  image: [".png", ".jpg", ".jpeg", ".tiff", ".tif", ".bmp", ".webp"]
  msg: [".msg"]

# Qdrant vector database
qdrant:
  host: "localhost"
  port: 6333
  collection: "localsearch"

# Ollama LLM
ollama:
  host: "http://localhost:11434"
  model: "qwen3:14b"

# Embedding model
embedding:
  model: "mixedbread-ai/mxbai-embed-large-v1"
  batch_size: 64
  device: "cuda"  # "cuda" for GPU, "cpu" for CPU

# Whisper (audio/video transcription)
whisper:
  model_size: "large-v3"
  device: "cuda"
  compute_type: "float16"
  language: null  # null = auto-detect

# Text chunking
chunking:
  chunk_size: 1000
  chunk_overlap: 200

# Scanner
scanner:
  max_file_size_mb: 500        # Global hard cap (per-type limits below are tighter)
  use_content_hash: false     # Use mtime+size for change detection (faster)
  batch_size: 1000            # Files per processing batch

# Pipeline processing
pipeline:
  cpu_workers: 8               # Parallel worker processes for CPU-bound extraction
  extraction_timeout: 300      # Max seconds per file (CPU extraction)
  gpu_timeout: 1800            # Max seconds per file (audio/video transcription)
  embed_batch_size: 256        # Chunks to accumulate before embedding
  type_max_mb:                 # Per-type file size limits (MB)
    text: 100
    pdf: 500
    docx: 200
    image: 50
    msg: 200
    audio: 2000
    video: 5000

# Query
query:
  top_k: 15                   # Number of results to return
  score_threshold: 0.3        # Minimum similarity score

# Metadata database
metadata_db: "data/localsearch_meta.db"

# Logging
log_level: "INFO"
