services:
  # ---------- Vector database ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: localsearch-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # For RAM disk performance: Z:\qdrant_storage:/var/lib/qdrant/storage
      # For normal disk: ./qdrant_storage:/var/lib/qdrant/storage
      - Z:/qdrant_storage:/var/lib/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333; printf \"GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; cat <&3' 2>/dev/null | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s

  # ---------- LocalSearch (ingest + web UI) ----------
  localsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localsearch-app
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      # Mount your files to scan (read-only is safest)
      - D:/:/scandata:ro
      # For RAM disk performance: Z:\localsearch_data:/app/data
      # For normal disk: ./data:/app/data
      - Z:/localsearch_data:/app/data
      # Model cache (avoids re-downloading on rebuild)
      - model_cache:/root/.cache
    environment:
      - LOCALSEARCH_CONFIG=/app/config.docker.yaml
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    # GPU access via NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Default: run ingest loop + web UI together
    # Override with: docker compose run localsearch ingest
    #                docker compose run localsearch web
    command: ["both"]

volumes:
  model_cache:
