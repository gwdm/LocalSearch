services:
  # ---------- Vector database ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: localsearch-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - D:/qdrant_data:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/collections || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  # ---------- LocalSearch (ingest + web UI) ----------
  localsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localsearch-app
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      # Mount your files to scan (read-only is safest)
      - D:/:/scandata:ro
      # Share host metadata DB so dashboard + Docker ingest use the same DB
      - D:/OneDrive/1_Python_REPOS/0-PROJECTS/LocalSearch/data:/data
      # Model cache (avoids re-downloading on rebuild)
      - model_cache:/root/.cache
    environment:
      - LOCALSEARCH_CONFIG=/app/config.docker.yaml
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    # GPU access via NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Default: run ingest loop + web UI together
    # Override with: docker compose run localsearch ingest
    #                docker compose run localsearch web
    command: ["both"]

volumes:
  model_cache:
    name: localsearch_model_cache
